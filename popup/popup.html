<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Code</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Source Tabs -->
    <div id="source-tabs" class="source-tabs">
      <button class="tab active" data-source="gmail">Gmail</button>
      <button class="tab" data-source="sms">SMS</button>
    </div>

    <!-- Header with Check Now button -->
    <div id="header" class="header hidden">
      <button id="check-now-btn" class="btn check-now">
        <span class="refresh-icon">🔄</span>
        <span class="spinner hidden"></span>
        <span class="btn-text">Check Now</span>
      </button>
      <span id="last-checked" class="last-checked"></span>
    </div>

    <!-- Loading State -->
    <div id="loading" class="state hidden">
      <div class="spinner-large"></div>
      <p id="loading-text">Checking Gmail...</p>
    </div>

    <!-- Auth Required State -->
    <div id="auth-required" class="state hidden">
      <div class="icon">🔐</div>
      <p>Sign in to Gmail to detect verification codes</p>
      <button id="auth-btn" class="btn primary">Sign in with Google</button>
    </div>

    <!-- No Code State -->
    <div id="no-code" class="state hidden">
      <div class="icon">📭</div>
      <p>No verification codes detected</p>
      <span class="hint">Click "Check Now" to refresh</span>
    </div>

    <!-- Code Available State -->
    <div id="code-available" class="state hidden">
      <div class="code-display">
        <span id="code-value" class="code">------</span>
        <button id="copy-btn" class="btn icon-btn" title="Copy to clipboard">
          <span class="copy-icon">📋</span>
          <span class="check-icon hidden">✓</span>
        </button>
      </div>
      <div class="meta">
        <span id="code-from" class="from"></span>
        <span id="code-time" class="time"></span>
      </div>
      <div class="status" id="copy-status"></div>
      <div class="button-row">
        <button id="copy-archive-btn" class="btn primary">
          <span class="btn-text">Copy & Archive</span>
          <span class="btn-spinner hidden"></span>
        </button>
        <button id="clear-btn" class="btn secondary">Dismiss</button>
      </div>
    </div>

    <!-- SMS Offline State -->
    <div id="sms-offline" class="state hidden">
      <div class="icon">📡</div>
      <p>Mac Mini offline</p>
      <span class="hint">SMS relay unreachable — check Tailscale</span>
      <button id="sms-retry-btn" class="btn secondary retry">Retry</button>
    </div>

    <!-- Error State -->
    <div id="error-state" class="state hidden">
      <div class="icon">⚠️</div>
      <p id="error-message">Something went wrong</p>
      <button id="retry-btn" class="btn secondary">Retry</button>
    </div>

    <!-- Code History -->
    <div id="history-section" class="history-section hidden">
      <button id="history-toggle" class="history-toggle">
        <span class="history-arrow">▶</span> Recent codes
      </button>
      <div id="history-list" class="history-list hidden"></div>
      <a id="clear-history" class="clear-history hidden" href="#">Clear history</a>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
